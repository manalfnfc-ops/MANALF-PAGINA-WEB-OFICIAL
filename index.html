<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANALF - Soluciones Tecnologicas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* ===== CAPAS DE FONDO ===== */

    /* Imagen estatica del ultimo frame (siempre presente, se revela con fade) */
    #staticBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0;
      transition: opacity 1s ease;
    }

    /* Video de fondo */
    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    /* ===== OVERLAY BLUR INICIAL ===== */
    .blur-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.5s;
    }

    .blur-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Movimiento sutil del botón - solo en desktop */
    @keyframes pulse-float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-3px);
      }
    }

    .pulse-btn {
      animation: pulse-float 4s ease-in-out infinite;
    }

    @media (max-width: 768px) {
      .pulse-btn {
        animation: none;
      }
    }

    /* Indicador de carga */
    .loader {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .loader.visible {
      opacity: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ===== BOTON CRISTAL ===== */
    .glass-btn {
      padding: 18px 52px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 16px;
      letter-spacing: 0.8px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow:
        0 0 30px rgba(100, 180, 255, 0.05),
        0 4px 20px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      font-weight: 500;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .glass-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 12px 40px rgba(100, 180, 255, 0.12),
        0 4px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.28);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .glass-btn:hover::before {
      opacity: 1;
    }

    .glass-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .glass-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== CONTENIDO PRINCIPAL ===== */
    .main-content {
      position: relative;
      z-index: 5;
      opacity: 0;
      visibility: hidden;
      transition: opacity 2s ease 0.5s, visibility 2s ease 0.5s;
      overflow-x: hidden;
    }

    .main-content.visible {
      opacity: 1;
      visibility: visible;
    }

    /* ===== SECCIONES ===== */
    .hero-section {
      padding: 80px 40px;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.55) 100%);
    }

    .hero-section h1 {
      font-size: 4rem;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: -2px;
      text-shadow: 0 4px 20px rgba(0, 150, 255, 0.25), 0 2px 8px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #fff 30%, #7ec8ff 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px rgba(126, 200, 255, 0.3));
    }

    .hero-section p {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.8);
      max-width: 600px;
      line-height: 1.7;
      margin-bottom: 40px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 24px;
    }

    .product-card h3 {
      font-size: 1.4rem;
      margin-bottom: 15px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .product-card p {
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 20px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px;
      border-radius: 16px;
    }

    .service-item h3 {
      font-size: 1.25rem;
      margin-bottom: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.95);
    }

    .service-item p {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.95rem;
      line-height: 1.6;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px;
      border-radius: 14px;
    }

    .offering-card h3 {
      font-size: 1.4rem;
      margin-bottom: 15px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    .offering-card p {
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 20px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 16px;
      border-radius: 16px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: rgba(0, 150, 255, 0.15);
      border: 1px solid rgba(0, 180, 255, 0.3);
      border-radius: 50px;
      color: #7ec8ff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(8px);
    }

    .hero-cta:hover {
      background: rgba(0, 150, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 150, 255, 0.2);
    }

    .products-section {
      padding: 100px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .products-section h2 {
      font-size: 2.8rem;
      margin-bottom: 60px;
      text-align: center;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      display: inline-block;
      margin-left: 50%;
      transform: translateX(-50%);
      letter-spacing: 0.5px;
    }

    .services-section h2 {
      font-size: 2.8rem;
      margin-bottom: 60px;
      text-align: center;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 16px;
      display: inline-block;
      margin-left: 50%;
      transform: translateX(-50%);
      letter-spacing: 0.5px;
    }
